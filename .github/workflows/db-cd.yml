name: db-cd

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations"
      - "supabase/tests"
      - ".github/workflows/db-ci.yml"
      - ".github/workflows/db-cd.yml"

jobs:
  detect-tests:
    runs-on: ubuntu-latest
    outputs:
      has_tests: ${{ steps.check.outputs.has_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect DB tests
        id: check
        run: |
          if [ -d "supabase/tests" ] && find supabase/tests -type f | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

  validate-migrations:
    runs-on: ubuntu-latest
    needs: detect-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Reset local DB and apply migrations
        run: supabase db reset --local
      
      - name: Run DB tests if present
        if: needs.detect-tests.outputs.has_tests == 'true'
        run: supabase test db

      - name: Stop local Supabase
        if: always()
        run: supabase stop

  deploy-prod:
    runs-on: ubuntu-latest
    needs: validate-migrations
    if: github.ref == 'refs/heads/main' && needs.validate-migrations.result == 'success'
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROD_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$PROJECT_ID"

      - name: Preview migrations
        run: supabase db push --dry-run

      - name: Apply migrations
        run: supabase db push