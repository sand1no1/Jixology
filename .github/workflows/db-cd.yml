name: db-cd

on:
  push:
    branches: [develop, main]
    paths:
      - "supabase/**"
      - ".github/workflows/db-cd.yml"

  workflow_dispatch:

concurrency:
  group: db-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.79.0

      - name: Start local Supabase
        run: supabase start

      - name: Reset local DB and apply migrations
        run: supabase db reset --local

      - name: Stop local Supabase
        if: always()
        run: supabase stop

  db-cd:
    runs-on: ubuntu-latest
    needs: validate-migrations
    if: >
      needs.validate-migrations.result == 'success' &&
      (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')

    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.79.0

      - name: Link Supabase project
        run: supabase link --project-ref "$PROJECT_ID"

      - name: Preview migrations
        run: supabase db push --dry-run

      - name: Apply migrations
        run: supabase db push