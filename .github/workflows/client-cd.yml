name: client-cd

on:
  push:
    branches: [staging, main]
    paths:
      - 'client/**'
      - '.github/workflows/client-cd.yml'

  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: client-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-cd:
    runs-on: ubuntu-latest
    if: ${{ (github.ref == 'refs/heads/staging' && vars.ENABLE_FRONTEND_STAGING_DEPLOY == 'true') ||
      (github.ref == 'refs/heads/main' && vars.ENABLE_FRONTEND_PROD_DEPLOY == 'true')}}
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set lowercase owner
        id: repo
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set environment values
        id: vars
        run: |
          if [[ "${GITHUB_REF_NAME}" == "staging" ]]; then
            echo "image_tag=staging" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "image_tag=prod" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner_lc }}/client:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.repo.outputs.owner_lc }}/client:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=frontend
            org.opencontainers.image.description=Frontend image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Trigger Render deploy
        run: |
          test -n "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
