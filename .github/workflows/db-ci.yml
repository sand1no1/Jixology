name: db-ci

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "supabase/**"
      - ".github/workflows/db-ci.yml"
      - ".github/workflows/db-cd.yml"
  push:
    branches: ['feature/**', develop, main]
    paths:
      - "supabase/**"
      - ".github/workflows/db-ci.yml"
      - ".github/workflows/db-cd.yml"

jobs:
  detect-tests:
    if: ${{ vars.ENABLE_DB_CI == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      has_tests: ${{ steps.check.outputs.has_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect DB tests
        id: check
        run: |
          if [ -d "supabase/tests" ] && find supabase/tests -type f | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

  db-ci:
    if: ${{ vars.ENABLE_DB_CI == 'true' && needs.detect-tests.outputs.has_tests == 'true' }}
    runs-on: ubuntu-latest
    needs: detect-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.79.0
      
      - name: Start local Supabase
        run: supabase start

      - name: Reset local DB and apply migrations
        run: supabase db reset --local
      
      - name: Run DB tests if present
        if: needs.detect-tests.outputs.has_tests == 'true'
        run: supabase test db

      - name: Stop local Supabase
        if: always()
        run: supabase stop
