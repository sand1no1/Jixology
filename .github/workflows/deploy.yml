name: CI/CD Pipeline

on:
  push:
    branches: [ main, PUBLISH-RENDER ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Frontend Checks
        run: |
          npm install
          npm run lint
          npm run build
          
      - name: Backend Checks
        run: |
          cd server
          npm install
          npm run build

  build-and-push:
    needs: quality-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jixology-client:latest
            ghcr.io/${{ github.repository_owner }}/jixology-client:${{ github.sha }}

      - name: Build & Push Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jixology-server:latest
            ghcr.io/${{ github.repository_owner }}/jixology-server:${{ github.sha }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/PUBLISH-RENDER'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy (Client)
        run: curl "${{ secrets.RENDER_CLIENT_DEPLOY_HOOK }}"
        
      - name: Trigger Render Deploy (Server)
        run: curl "${{ secrets.RENDER_SERVER_DEPLOY_HOOK }}"
